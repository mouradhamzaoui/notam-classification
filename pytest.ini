[pytest]
testpaths         = tests
asyncio_mode      = auto
addopts           =
    -v
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70
markers =
    unit:        Tests unitaires (rapides, sans I/O externe)
    integration: Tests d'intégration (API, DB)
    slow:        Tests lents (entraînement complet)