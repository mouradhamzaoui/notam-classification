# ══════════════════════════════════════════════════════════
# docker-compose.dev.yml — Override pour le développement
# Usage : docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ══════════════════════════════════════════════════════════

version: "3.9"

services:

  postgres:
    ports:
      - "5432:5432"     # Exposé pour accès direct DBeaver/psql

  api:
    build:
      target: builder   # Stage builder avec outils de dev
    volumes:
      - .:/app          # Hot-reload : monte le code source local
      - model_artifacts:/app/data/processed
    environment:
      PYTHONPATH: /app
    command: >
      uvicorn src.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug

  # ── pgAdmin (optionnel, dev only) ──────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: notam_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@notam.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - notam_network
    depends_on:
      - postgres