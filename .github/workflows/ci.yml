# ══════════════════════════════════════════════════════════
# CI Pipeline — NOTAM Classification System
# Déclencheur : push sur main/develop + pull requests
# Jobs : lint → test → build-check
# ══════════════════════════════════════════════════════════

name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION:     "0.4.18"

jobs:

  # ════════════════════════════════════════════════════════
  # JOB 1 — Lint & Format Check
  # ════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: 📦 Install dependencies
        run: uv sync --frozen

      - name: 🔍 Run Ruff linter
        run: uv run ruff check src/ tests/ --output-format=github
        continue-on-error: true

      - name: 🎨 Check Ruff formatting
        run: uv run ruff format src/ tests/ --check
        continue-on-error: true

  # ════════════════════════════════════════════════════════
  # JOB 2 — Unit Tests
  # ════════════════════════════════════════════════════════
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: 📦 Install dependencies
        run: uv sync --frozen

      - name: 🗄️ Generate dataset
        run: uv run python data/download_dataset.py

      - name: ⚙️ Build feature splits
        run: uv run python data/build_splits.py

      - name: 🚀 Train model (fast, no tuning)
        run: uv run python scripts/train.py --no-tune

      - name: 🧪 Run unit tests
        run: |
          uv run pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            --no-cov-on-fail \
            -m "unit"

      - name: 📊 Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml
          retention-days: 7

  # ════════════════════════════════════════════════════════
  # JOB 3 — Integration Tests
  # ════════════════════════════════════════════════════════
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: 📦 Install dependencies
        run: uv sync --frozen

      - name: 🗄️ Generate dataset
        run: uv run python data/download_dataset.py

      - name: ⚙️ Build feature splits
        run: uv run python data/build_splits.py

      - name: 🚀 Train model
        run: uv run python scripts/train.py --no-tune

      - name: 🔗 Run integration tests
        run: |
          uv run pytest tests/integration/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=xml:coverage-integration.xml \
            --no-cov-on-fail \
            -m "integration"

      - name: 📊 Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml
          retention-days: 7

  # ════════════════════════════════════════════════════════
  # JOB 4 — Full Test Suite + Coverage Report
  # ════════════════════════════════════════════════════════
  full-coverage:
    name: 📊 Full Coverage Report
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: 📦 Install dependencies
        run: uv sync --frozen

      - name: 🗄️ Prepare data & model
        run: |
          uv run python data/download_dataset.py
          uv run python data/build_splits.py
          uv run python scripts/train.py --no-tune

      - name: 📊 Run full test suite with coverage
        run: |
          uv run pytest \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=50

      - name: 📤 Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov
          path: htmlcov/
          retention-days: 14

      - name: 📤 Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # ════════════════════════════════════════════════════════
  # JOB 5 — Docker Build Check
  # ════════════════════════════════════════════════════════
  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: full-coverage

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: 📦 Install & prepare model artifacts
        run: |
          uv sync --frozen
          uv run python data/download_dataset.py
          uv run python data/build_splits.py
          uv run python scripts/train.py --no-tune

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: false
          tags: notam-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: ✅ Verify image built successfully
        run: |
          docker images
          docker inspect notam-api:ci-${{ github.sha }} > /dev/null && echo "✅ Image built successfully" || echo "❌ Image not found"