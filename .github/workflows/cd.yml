# ══════════════════════════════════════════════════════════
# CD Pipeline — NOTAM Classification System
# Déclencheur : push de tag vX.Y.Z sur main
# Jobs : build → push → deploy-summary
# ══════════════════════════════════════════════════════════

name: CD Pipeline

on:
  push:
    tags:
      - "v*.*.*"

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION:     "0.4.18"
  IMAGE_NAME:     notam-classification

jobs:

  # ════════════════════════════════════════════════════════
  # JOB 1 — Build & Push Docker Image
  # ════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Install uv & prepare artifacts
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: 📦 Build model artifacts
        run: |
          uv sync --frozen
          uv run python data/download_dataset.py
          uv run python data/build_splits.py
          uv run python scripts/train.py --no-tune

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: 🚀 Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       docker/api/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ════════════════════════════════════════════════════════
  # JOB 2 — Deployment Summary
  # ════════════════════════════════════════════════════════
  deploy-summary:
    name: 📋 Deployment Summary
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 📋 Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`ghcr.io/${{ github.repository }}/notam-classification:${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Deploy locally" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}/notam-classification:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker compose up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY